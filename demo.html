<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
    // 서비스 워커/캐시 완전 해제 (무한 리로드 방지)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쉽게말해 AI - 공문서·고지서 쉬운 말 요약 비서</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA 관련 설정 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="쉽게말해 AI">
  <link rel="apple-touch-icon" href="app_icon.png">
</head>
<body>

  <div class="app-layout">
    <!-- 상단 헤더 -->
    <header>
      <a href="index.html" class="logo-container" style="text-decoration: none; color: inherit;">
        <div class="logo-icon">말</div>
        <div class="logo-text">쉽게말해 AI</div>
      </a>
      
      <!-- 접근성 도구 모음 -->
      <div class="accessibility-panel">
        <a href="index.html" class="btn-acc" style="text-decoration: none;">
          <span>🏠</span> 홈으로 가기
        </a>
        <button id="toggle-large-font" class="btn-acc" aria-pressed="false">
          <span>🔎</span> 큰 글씨 모드
        </button>
        <button id="toggle-high-contrast" class="btn-acc" aria-pressed="false">
          <span>🌓</span> 고대비 모드
        </button>
        <button id="btn-open-settings" class="btn-acc" title="Gemini 설정">
          <span>⚙️</span> 설정
        </button>
      </div>
    </header>

    <div class="container chat-first-layout">
    <!-- 대화 영역 -->
    <div class="chat-main-pane">
      <div id="chat-messages-container" class="chat-messages-list">
        <!-- AI 첫인사 및 대화 내용들이 동적으로 추가됨 -->
      </div>
      
      <!-- 첨부 파일 미리보기 영역 -->
      <div id="attached-file-preview" class="attached-file-preview" style="display: none;"></div>

      <!-- 하단 입력바 및 안내 -->
      <div class="chat-input-bar-container">
        <!-- 개인정보 활용 동의 -->
        <div class="chat-privacy-banner">
          <input type="checkbox" id="privacy-consent" class="privacy-checkbox" checked>
          <label for="privacy-consent" class="privacy-label">
            개인정보(주민등록번호, 주소 등)의 자동 마스킹 처리에 동의합니다. (필수)
          </label>
        </div>

        <div class="chat-input-row">
          <!-- 파일 업로드 버튼 -->
          <button id="btn-attach-file" class="btn-chat-action" title="사진 또는 PDF 문서 올리기">
            <span style="font-size: 1.6rem; font-weight: 300; display: inline-block; transform: translateY(-1px);">+</span>
          </button>
          <input type="file" id="file-input" style="display: none;" accept="image/*,application/pdf">
          
          <!-- 텍스트 입력 -->
          <input type="text" id="chat-user-input" class="chat-text-input" placeholder="쉬운 말 AI에게 물어보기...">
          
          <!-- 마이크 및 전송 버튼 -->
          <div class="chat-input-actions">
            <button id="btn-chat-mic" class="btn-chat-mic-icon" title="음성으로 질문하기">🎤</button>
            <button id="btn-chat-send" class="btn-chat-send-icon" title="전송">▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div> <!-- Close .app-layout -->

  <!-- ================= ⚙️ 설정 모달 ================= -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2>⚙️ 쉽게말해 AI 설정</h2>
        <button id="btn-close-settings" class="btn-close-modal">&times;</button>
      </div>
      <div class="form-group" style="margin-top: 1rem;">
        <label class="form-label" for="gemini-api-key">🔑 Gemini API Key (실시간 요약 및 대화)</label>
        <input type="password" id="gemini-api-key" class="form-input" placeholder="API 키를 입력하세요...">
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem;">
          * 입력하지 않으면 미리 준비된 고품질 시뮬레이션 데이터를 사용하여 동작합니다.
        </p>
      </div>
      <div class="modal-actions" style="margin-top: 1.5rem;">
        <button id="btn-save-settings" class="btn-modal-action btn-calendar-google" style="background: var(--accent); color: white;">
          설정 저장하기
        </button>
      </div>
    </div>

  </div>

  <!-- ================= 캘린더 등록 모달 ================= -->
  <div id="calendar-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2>캘린더에 일정 등록하기</h2>
        <button id="btn-close-calendar" class="btn-close-modal">&times;</button>
      </div>
      <p style="font-size: var(--size-sub); margin-bottom: 1.5rem; color: var(--text-secondary);"> AI가 추출한 아래 일정 정보를 확인하고 필요시 수정해 주세요.</p>
      
      <form id="calendar-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label class="form-label" for="cal-title">일정 제목</label>
          <input type="text" id="cal-title" class="form-input" required>
        </div>
        
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div>
            <label class="form-label" for="cal-date">날짜</label>
            <input type="date" id="cal-date" class="form-input" required>
          </div>
          <div>
            <label class="form-label" for="cal-time">시간</label>
            <input type="time" id="cal-time" class="form-input" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="cal-description">일정 상세 설명</label>
          <textarea id="cal-description" class="form-input" style="height: 100px; resize: none;"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="cal-alarm">알림 설정</label>
          <select id="cal-alarm" class="form-input">
            <option value="0">정각 알림</option>
            <option value="60" selected>1시간 전</option>
            <option value="1440">1일 전</option>
            <option value="10080">1주일 전</option>
          </select>
        </div>

        <div class="modal-actions">
          <!-- 안드로이드 네이티브 연동용 버튼 (기본 숨김) -->
          <button id="btn-cal-native" class="btn-modal-action btn-calendar-ics" style="display: none;">
            <span>📱</span> 스마트폰 기본 캘린더에 추가
          </button>
          
          <!-- 웹 범용 버튼들 -->
          <div id="web-calendar-actions" style="display: contents;">
            <button id="btn-cal-google" class="btn-modal-action btn-calendar-google">
              <span>🔵</span> 구글 캘린더에 추가
            </button>
            <button id="btn-cal-outlook" class="btn-modal-action btn-calendar-outlook">
              <span>💻</span> 아웃룩 캘린더에 추가
            </button>
            <button id="btn-cal-ics" class="btn-modal-action btn-calendar-ics">
              <span>💾</span> 표준 달력 파일(.ics) 다운로드
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ================= 보호자 공유 모달 ================= -->
  <div id="share-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2>자녀 또는 보호자에게 공유하기</h2>
        <button id="btn-close-share" class="btn-close-modal">&times;</button>
      </div>
      
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <span style="font-size: 3rem;">💬</span>
        <p style="font-weight: 600; margin-top: 0.5rem;">카카오톡으로 분석 요약본 보내기</p>
        <p style="font-size: var(--size-sub); color: var(--text-muted); margin-top: 4px;">복잡한 글 대신, 깔끔하게 정리된 내용을 보호자에게 바로 전달합니다.</p>
      </div>

      <div class="form-group">
        <label class="form-label">전송될 요약 내용 미리보기</label>
        <div id="share-preview-content" class="source-container active" style="font-size: 0.9rem; max-height: 180px; overflow-y: auto;">
          <!-- 공유 텍스트 미리보기 -->
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-share-kakao" class="btn-modal-action" style="background: #fee500; color: #191919; border: none;">
          <span>💬</span> 카카오톡 공유하기
        </button>
        <button id="btn-share-copy" class="btn-modal-action" style="background: var(--bg-app); color: var(--text-primary); border: 1px solid var(--border-color);">
          <span>📋</span> 요약 텍스트 전체 복사하기
        </button>
      </div>
    </div>
  </div>

  <!-- 알림 토스트 메시지 -->
  <div id="toast" class="toast">토스트 메시지 내용</div>

  <!-- JavaScript 연동 -->
  <script src="mockData.js"></script>
  <script src="key.js"></script>
  <script src="app.js"></script>
</body>
</html>
